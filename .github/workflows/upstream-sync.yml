name: Upstream Sync

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:
    inputs:
      selftest:
        description: "Verify ANTHROPIC_API_KEY: run the AI review on a fixed historical tag range, no sync/PR"
        type: boolean
        default: false

concurrency:
  group: upstream-sync
  cancel-in-progress: true

jobs:
  # One-off verification that the ANTHROPIC_API_KEY secret works end-to-end in CI
  # (run after setting/rotating the key). Exercises the real review step against
  # v2.3.6..v2.4.0; creates no branch or PR.
  selftest:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.selftest }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Fetch upstream tags
        run: |
          git remote add upstream https://github.com/EtienneLescot/n8n-as-code.git || true
          git fetch upstream --tags
      - name: Run AI review (verifies the key)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: v2.3.6
          HEAD_REF: v2.4.0
        run: |
          python3 .github/scripts/ai_security_review.py | tee /tmp/selftest.md
          {
            echo '## 🔑 ANTHROPIC_API_KEY self-test (v2.3.6 → v2.4.0)'
            echo
            cat /tmp/selftest.md
          } >> "$GITHUB_STEP_SUMMARY"
          if grep -q "ANTHROPIC_API_KEY not set\|Error generating AI review" /tmp/selftest.md; then
            echo "::error::AI review did not run with a valid key — check the secret."
            exit 1
          fi

  sync:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.selftest) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/EtienneLescot/n8n-as-code.git || true
          git fetch upstream --tags

      - name: Check for new stable release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upstream cuts BOTH clean semver releases (vX.Y.Z) and release-<sha>
          # snapshot releases. Track only semver, non-prerelease releases.
          TAG=$(gh api repos/EtienneLescot/n8n-as-code/releases --paginate \
            --jq 'map(select(.prerelease==false) | .tag_name | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))) | .[0]') || TAG=""
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "No upstream semver release found — nothing to do."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Current fork version = latest semver tag reachable from main.
          # (plugin.json/marketplace.json versions lag the release tag, so the
          # git tag is the only reliable proxy for "what we last merged".)
          CURRENT=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "none")
          echo "Latest upstream semver: ${TAG} — fork main: ${CURRENT}"
          if [ "$TAG" = "$CURRENT" ]; then
            echo "Fork is up to date — nothing to do."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Create or reset sync branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git checkout -B upstream-sync "${{ steps.check.outputs.tag }}"
          # Fork owns .github entirely — drop upstream CI, restore ours
          rm -rf .github
          git checkout origin/main -- .github/
          git add -A .github
          git diff --cached --quiet || git commit -m "ci: replace upstream CI with fork sync workflow"
          git push origin upstream-sync --force

      - name: Run npm audit (best-effort)
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set +e
          # --ignore-scripts: never run upstream lifecycle scripts during audit.
          # --package-lock-only: resolve the dependency tree without installing.
          npm install --ignore-scripts --package-lock-only > /tmp/npm_install.txt 2>&1
          npm audit --omit=dev > /tmp/npm_audit.txt 2>&1
          echo "npm audit exit code: $?" >> /tmp/npm_audit.txt
          set -e
          tail -100 /tmp/npm_audit.txt

      - name: Generate AI security review
        if: steps.check.outputs.has_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: origin/main
          HEAD_REF: ${{ steps.check.outputs.tag }}
        run: python3 .github/scripts/ai_security_review.py

      - name: Open or update PR
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          COMMITS=$(git log origin/main.."$TAG" --oneline -- . ':!.github' | head -80)
          RELEASE_NOTES=$(gh api "repos/EtienneLescot/n8n-as-code/releases/tags/${TAG}" --jq .body 2>/dev/null | head -80)

          {
            printf '## Upstream Sync — %s\n\n' "$TAG"
            printf '**Upstream release notes ([EtienneLescot/n8n-as-code](https://github.com/EtienneLescot/n8n-as-code/releases)):**\n%s\n\n' "$RELEASE_NOTES"
            printf '**Commits (first 80):**\n```\n%s\n```\n\n---\n\n' "$COMMITS"
            printf '## 🤖 AI Security Review\n\n'
            cat /tmp/ai_review.md
            printf '\n\n---\n\n## 🔒 npm audit\n\n```\n'
            tail -100 /tmp/npm_audit.txt 2>/dev/null || echo "(npm audit not run)"
            printf '```\n\n---\n\n'
            printf '**After merging, update local consumption:**\n'
            printf '```\n# 1. Plugin (skills): pull the serving clone\n'
            printf 'git -C ~/Developer/devon-plugins/n8n-as-code pull --ff-only\n'
            printf '# 2. n8nac CLI: rebuild from the merged fork\n'
            printf 'cd ~/Projects/n8n-as-code && git checkout main && git pull --ff-only \\\n'
            printf '  && npm install --ignore-scripts && npm run build:cli \\\n'
            printf '  && npm install -g ./packages/cli\n```\n\n'
            printf '*Auto-generated by upstream-sync workflow*\n'
          } > /tmp/pr_body.md

          EXISTING=$(gh pr list --repo "${{ github.repository }}" --base main --head upstream-sync --json number --jq '.[0].number' 2>/dev/null)

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh pr edit "$EXISTING" --repo "${{ github.repository }}" \
              --title "⬆️ Upstream sync — ${TAG}" \
              --body-file /tmp/pr_body.md
            echo "Updated existing PR #${EXISTING}"
          else
            gh pr create --repo "${{ github.repository }}" \
              --base main \
              --head upstream-sync \
              --title "⬆️ Upstream sync — ${TAG}" \
              --body-file /tmp/pr_body.md
          fi
