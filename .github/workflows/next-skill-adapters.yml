name: Next Skill Adapters

on:
  push:
    branches: [next]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  update-next-skill-adapters:
    name: Update Next Skill Adapters
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: npm install

      - name: Regenerate next skill adapters
        env:
          N8NAC_SKILL_ADAPTER_DIST_TAG: next
        run: npm run build:adapters:branch --workspace=packages/skills

      - name: Commit generated adapters
        run: |
          files=(
            skills/README.md
            skills/n8n-architect/SKILL.md
            plugins/claude/n8n-as-code/skills/n8n-architect/SKILL.md
            plugins/openclaw/n8n-as-code/skills/n8n-architect/SKILL.md
            plugins/cursor/n8n-as-code/skills/n8n-architect/SKILL.md
          )

          if git diff --quiet --exit-code -- "${files[@]}"; then
            echo 'Next skill adapters are already up to date.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "${files[@]}"
          git commit -m 'chore: update generated next skill adapters'
          git push
